name: Auto sync with upstream

on:
  schedule:
    - cron: '0 0 1,16 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/caddyserver/caddy.git
          git fetch upstream

      - name: Create sync branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b sync-$(date +%s) upstream/master

      - name: Rebase changes onto new branch
        run: |
          # List and rebase your custom commits
          git cherry-pick $(git log origin/master --format=%H --not upstream/master)
          
          # Preserve your workflow files
          git checkout origin/master -- .github/workflows/
          git add .github/workflows/
          git commit -m "Preserve custom workflows"

      - name: Push to new branch
        run: git push origin HEAD -f

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: "Sync with upstream $(date +'%Y-%m-%d')"
          body: "Automated synchronization with upstream repository"
          base: master
          branch: sync-branch
          delete-branch: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
